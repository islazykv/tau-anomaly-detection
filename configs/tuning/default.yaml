# Ray Tune hyperparameter search — override via CLI:
#   uv run python run.py stage=tune tuning.num_samples=200
num_samples: 10
scheduler: "ASHA"
direction: "minimize"
subsample_fraction: 0.1  # fraction of data to use (e.g. 0.1 for 10%)

study_name: "tau-anomaly-detection-tuning"

search_space:
  ae:
    n_layers:
      type: int
      low: 2
      high: 5
    layer_size:
      type: categorical
      choices: [32, 64, 128, 256]
    latent_dim:
      type: categorical
      choices: [4, 8, 16, 32]
    dropout:
      type: float
      low: 0.0
      high: 0.5
      log: false
    learning_rate:
      type: float
      low: 1e-5
      high: 1e-2
      log: true
    weight_decay:
      type: float
      low: 1e-6
      high: 1e-3
      log: true
    batch_size:
      type: categorical
      choices: [256, 512, 1024, 2048]

  vae:
    n_layers:
      type: int
      low: 2
      high: 5
    layer_size:
      type: categorical
      choices: [32, 64, 128, 256]
    latent_dim:
      type: categorical
      choices: [4, 8, 16, 32]
    dropout:
      type: float
      low: 0.0
      high: 0.5
      log: false
    learning_rate:
      type: float
      low: 1e-5
      high: 1e-2
      log: true
    weight_decay:
      type: float
      low: 1e-6
      high: 1e-3
      log: true
    batch_size:
      type: categorical
      choices: [256, 512, 1024, 2048]
    beta:
      type: float
      low: 0.001
      high: 10.0
      log: true
